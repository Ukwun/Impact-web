<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're Offline - ImpactApp</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
        'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
        sans-serif;
      background: linear-gradient(135deg, #051e3b 0%, #0a3553 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      text-align: center;
      max-width: 400px;
    }

    .icon {
      width: 80px;
      height: 80px;
      background: rgba(31, 167, 116, 0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 30px;
      font-size: 40px;
    }

    h1 {
      font-size: 28px;
      font-weight: 900;
      margin-bottom: 10px;
    }

    p {
      color: #b1b9cf;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-direction: column;
    }

    button {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-retry {
      background: linear-gradient(to right, #1FA774, #1a926a);
      color: white;
    }

    .btn-retry:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(31, 167, 116, 0.3);
    }

    .btn-home {
      background: rgba(10, 53, 83, 0.5);
      color: #b1b9cf;
      border: 1px solid rgba(175, 183, 207, 0.2);
    }

    .btn-home:hover {
      background: rgba(10, 53, 83, 0.8);
      color: white;
    }

    .status {
      margin-top: 30px;
      padding-top: 30px;
      border-top: 1px solid rgba(175, 183, 207, 0.1);
      font-size: 14px;
      color: #8a97b8;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Don't worry, we've cached some content for you to browse while offline.</p>
    
    <div class="actions">
      <button class="btn-retry" onclick="window.location.reload()">
        Try Again
      </button>
      <button class="btn-home" onclick="window.location.href = '/'">
        Go to Home
      </button>
    </div>

    <div class="status">
      <p>Status: No internet connection</p>
      <p>Once online, cached pages will load faster.</p>
    </div>
  </div>
</body>
</html>

# Netlify Configuration for ImpactEdu Next.js App

# Enable the official Netlify Next.js plugin for best compatibility with App Router + API routes
[[plugins]]
  package = "@netlify/plugin-nextjs"

[build]
  # Build command - generates Next.js optimized production build
  command = "npm run build"
  # Output directory where Next.js creates production-ready files
  publish = ".next"
  # Node version to use
  node_version = "18.17.0"

[build.environment]
  # Next.js specific settings
  NODE_ENV = "production"
  # Ensure devDependencies (like eslint) are installed during build
  NPM_CONFIG_PRODUCTION = "false"

# Redirect all non-matching routes to Next.js
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/next"
  status = 200

# Cache configuration for assets
[[headers]]
  for = "/static/*"
    [headers.values]
      Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
    [headers.values]
      Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
    [headers.values]
      Cache-Control = "public, max-age=31536000, immutable"

# API error handling
[[redirects]]
  from = "/api/*"
  to = "api/:splat"
  status = 200
  force = false

# Security headers
[[headers]]
  for = "/*"
    [headers.values]
      X-Content-Type-Options = "nosniff"
      X-Frame-Options = "DENY"
      X-XSS-Protection = "1; mode=block"
      Referrer-Policy = "strict-origin-when-cross-origin"
      Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# CORS headers for API routes (customize based on your frontend domain)
[[headers]]
  for = "/api/*"
    [headers.values]
      Access-Control-Allow-Origin = "*"
      Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
      Access-Control-Allow-Headers = "Content-Type, Authorization"

# Environment variable configuration
# These should be set in Netlify UI, but listed here for reference
[context.production.environment]
  # Copy all from environment variables in Netlify UI

[functions]
  # Directory containing serverless functions
  directory = ".netlify/functions"
